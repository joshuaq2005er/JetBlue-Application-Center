<!DOCTYPE html>
<html>
<head>
<title>JetBlue Cabin Crew Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef6ff;
}

.header{
background:#0073e6;
color:white;
padding:20px;
text-align:center;
}

.tabs{
display:flex;
justify-content:center;
background:white;
}

.tab{
padding:10px 15px;
margin:5px;
cursor:pointer;
background:#eee;
border-radius:8px;
}

.active{
background:#0073e6;
color:white;
}

.container{
width:90%;
margin:auto;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

button{
padding:6px 10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

#modalBox{
background:white;
width:650px;
margin:60px auto;
padding:20px;
border-radius:12px;
max-height:80vh;
overflow:auto;
}
</style>
</head>

<body>

<div class="header">
<h2>JetBlue Cabin Crew Admin Dashboard</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab(0)">Status</div>
<div class="tab" onclick="showTab(1)">Applications</div>
<div class="tab" onclick="showTab(2)">History</div>
</div>

<div class="container">

<div id="status"></div>
<div id="apps" style="display:none;"></div>
<div id="history" style="display:none;"></div>

</div>

<div id="modal">
<div id="modalBox">
<h3>Application Details</h3>
<div id="modalContent"></div>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let pass = prompt("Admin Password:");
if(pass !== "JB123478JBCC"){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:100px'>ACCESS DENIED</h1>";
throw new Error();
}

function get(key){
return JSON.parse(localStorage.getItem(key)||"[]");
}

function getStatus(role){
let s=localStorage.getItem("roleStatus_"+role);
if(!s){
localStorage.setItem("roleStatus_"+role,"OPEN");
return "OPEN";
}
return s;
}

function toggleStatus(role){
let s=getStatus(role);
localStorage.setItem("roleStatus_"+role,s==="OPEN"?"CLOSED":"OPEN");
load();
}

function hideApp(i){
let apps=get("apps");
apps[i].hidden=!apps[i].hidden;
localStorage.setItem("apps",JSON.stringify(apps));
load();
}

function deleteApp(i){
let apps=get("apps");
apps[i].deleted=true;
localStorage.setItem("apps",JSON.stringify(apps));
load();
}

function showMore(i){
let a=get("apps")[i];

document.getElementById("modalContent").innerHTML=`

<b>Role:</b> ${a.role}<br><br>

<b>Discord:</b> ${a.ccdiscord}<br>
<b>ID:</b> ${a.ccdiscordid}<br>
<b>Roblox:</b> ${a.ccroblox}<br>
<b>Time:</b> ${a.cctime}<br>
<b>Age:</b> ${a.ccage}<br><br>

<hr>

<b>Activity:</b><br>
<b>Timezone:</b>${a.cctimezone}<br>
<b>Roblox Active (/5):</b>${a.ccrobloxact}<br>
<b>Discord Active (/5):</b>${a.ccdiscordact}<br>
<b>Device:</b>${a.ccdevice}<br>
<b>Grammar (/5)</b>${a.ccgrammar}<br><br>

<hr>

<b>About:</b><br>
<b>Describe yourself and what you enjoy doing (2+ sentences required).</b>${a.ccwords}<br>
<b>Do you have any experience as Cabin Crew in any PTC groups?</b>${a.ccexp}<br>
<b>Why do you want to work at JetBlue? (2 sentences required)</b>${a.ccwhy}<br>
<b>What makes you stand out over other applicants? (2+ sentences required)</b>${a.ccstandout}<br>
<b>What are your weaknesses and strengths? (2+ each)</b>${a.ccstrengths}<br><br>

<hr>

<b>Scenarios:</b><br>
<b>Once the plane is cruising, what would your job be as a caterer?</b>${a.ccs1}<br>
<b>If a passenger asks for something that you don't serve, what would be your reaction?</b>${a.ccs2}<br>
<b>If a passenger is causing a disturbance to other passengers, what should you do?</b>${a.ccs3}<br>
<b>During an emergency, what do you think your primary role would be to do?</b>${a.ccs4}<br><br>

<hr>

<b>Agreements:</b><br>
<b></b>${a.ccagree1}<br>
<b></b>${a.ccagree2}<br>

`;

document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function load(){

let roles=["Flight Deck","Cabin Crew","Ground Crew"];

let statusDiv=document.getElementById("status");
let appsDiv=document.getElementById("apps");
let historyDiv=document.getElementById("history");

statusDiv.innerHTML="";
appsDiv.innerHTML="";
historyDiv.innerHTML="";

roles.forEach(r=>{
let s=getStatus(r);

statusDiv.innerHTML+=`
<div class="card">
<b>${r}</b><br>
Status: <b style="color:${s==='OPEN'?'green':'red'}">${s}</b><br>
<button onclick="toggleStatus('${r}')">Toggle</button>
</div>
`;
});

let apps=get("apps");

apps.forEach((a,i)=>{
if(a.deleted) return;

appsDiv.innerHTML+=`
<div class="card" style="opacity:${a.hidden?0.5:1}">
<h3>${a.role}</h3>
<b>${a.ccdiscord}</b><br>
<b>${a.ccroblox}</b><br>
<b>${a.date}</b><br>

<button onclick="hideApp(${i})">${a.hidden?"Unhide":"Hide"}</button>
<button onclick="deleteApp(${i})" style="background:red;color:white;">Delete</button>
<button onclick="showMore(${i})" style="background:#0073e6;color:white;">Show More</button>
</div>
`;
});

let history=get("history")||[];

history.forEach(h=>{
historyDiv.innerHTML+=`
<div class="card">
<b>${h.role}</b><br>
${h.ccdiscord}<br>
${h.ccroblox}<br>
${h.date}
</div>
`;
});

}

function showTab(i){
["status","apps","history"].forEach((id,j)=>{
document.getElementById(id).style.display=(i===j)?"block":"none";
});

document.querySelectorAll(".tab").forEach((t,j)=>{
t.classList.toggle("active",i===j);
});
}

load();

</script>
</body>
</html>
