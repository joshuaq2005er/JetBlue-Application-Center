<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Admin</title>

  <style>
    body { font-family:Arial; background:#eef6ff; }
    .card {
      background:white; padding:15px;
      margin:10px; border-radius:10px;
    }

    select, button { margin-top:5px; }
  </style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div id="list"></div>

<script>

function load(){
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  let list = document.getElementById("list");
  list.innerHTML = "";

  apps.forEach(app => {

    list.innerHTML += `
      <div class="card">

        <b>Role:</b> ${app.role}<br>
        <b>Status:</b> ${app.status}<br>
        <b>Date:</b> ${app.date}<br><br>

        <b>Discord:</b> ${app.discord}<br>
        <b>Roblox:</b> ${app.roblox}<br>
        <b>Time:</b> ${app.time}<br><br>

        <b>Why:</b> ${app.why}<br><br>
        <b>Strengths:</b> ${app.strengths}<br><br>

        <select onchange="update(${app.id}, this.value)">
          <option ${app.status==="Pending"?"selected":""}>Pending</option>
          <option ${app.status==="Accepted"?"selected":""}>Accepted</option>
          <option ${app.status==="Denied"?"selected":""}>Denied</option>
        </select>

        <button onclick="del(${app.id})">Delete</button>

      </div>
    `;
  });
}

function update(id, status){
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps = apps.map(a=>{
    if(a.id === id) a.status = status;
    return a;
  });

  localStorage.setItem("applications", JSON.stringify(apps));
  load();
}

function del(id){
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps = apps.filter(a => a.id !== id);

  localStorage.setItem("applications", JSON.stringify(apps));
  load();
}

load();

</script>

</body>
</html>
