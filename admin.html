<!DOCTYPE html>
<html>
<head>
<title>JetBlue Admin Panel</title>

<style>
body{
font-family:Arial;
background:#eef6ff;
margin:0;
}

.header{
background:#0073e6;
color:white;
text-align:center;
padding:20px;
}

.tabs{
display:flex;
justify-content:center;
background:white;
}

.tab{
padding:10px 15px;
margin:5px;
background:#eee;
cursor:pointer;
border-radius:8px;
}

.active{
background:#0073e6;
color:white;
}

.container{
width:90%;
margin:auto;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

button{
padding:6px 10px;
margin-top:5px;
border:none;
cursor:pointer;
border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
<h2>JetBlue Admin Dashboard</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="show(0)">Status</div>
<div class="tab" onclick="show(1)">Applications</div>
<div class="tab" onclick="show(2)">History</div>
</div>

<div class="container" id="status"></div>
<div class="container" id="apps" style="display:none;"></div>
<div class="container" id="history" style="display:none;"></div>

<script>

/* ================= PASSWORD ================= */
let pass = prompt("Admin Password:");

if(pass !== "JB123478JBC"){
document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:100px'>ACCESS DENIED</h1>";
throw new Error();
}

/* ================= SAFE GET ================= */
function get(key){
return JSON.parse(localStorage.getItem(key) || "[]");
}

/* ================= SAVE ================= */
function save(){
localStorage.setItem("apps", JSON.stringify(get("apps")));
}

/* ================= STATUS TOGGLE ================= */
function toggle(role){
let key = "roleStatus_" + role;
let current = localStorage.getItem(key) || "OPEN";

localStorage.setItem(key, current === "OPEN" ? "CLOSED" : "OPEN");
load();
}

/* ================= HIDE / UNHIDE ================= */
function hide(i){
let apps = get("apps");

if(!apps[i]) return;

apps[i].hidden = !apps[i].hidden;
save();
load();
}

/* ================= DELETE (SOFT DELETE) ================= */
function del(i){
let apps = get("apps");

if(!apps[i]) return;

apps[i].deleted = true;
save();
load();
}

/* ================= LOAD ALL DATA ================= */
function load(){

let roles = ["Flight Deck","Cabin Crew","Ground Crew"];

let statusDiv = document.getElementById("status");
let appsDiv = document.getElementById("apps");
let historyDiv = document.getElementById("history");

statusDiv.innerHTML = "";
appsDiv.innerHTML = "";
historyDiv.innerHTML = "";

/* ===== STATUS ===== */
roles.forEach(r=>{
let s = localStorage.getItem("roleStatus_" + r) || "OPEN";

statusDiv.innerHTML += `
<div class="card">
<b>${r}</b><br>
Status: <b style="color:${s==='OPEN'?'green':'red'}">${s}</b><br>
<button onclick="toggle('${r}')">Toggle</button>
</div>
`;
});

/* ===== APPLICATIONS ===== */
let apps = get("apps");

if(apps.length === 0){
appsDiv.innerHTML = "<div class='card'>No applications yet</div>";
} else {

apps.forEach((a,i)=>{

if(a.deleted) return;

appsDiv.innerHTML += `
<div class="card" style="opacity:${a.hidden ? 0.4 : 1}">

<h3>${a.role || "Unknown Role"}</h3>

<b>Discord:</b> ${a.discord || "-"}<br>
<b>Roblox:</b> ${a.roblox || "-"}<br>
<b>Date:</b> ${a.date || "-"}<br>

<hr>

<b>WHY:</b><br>${a.why || "-"}<br><br>

<b>Flight Knowledge:</b><br>
Flaps: ${a.flaps || "-"}<br>
VFR: ${a.vfr || "-"}<br>
ILS: ${a.ils || "-"}<br>

<hr>

<button onclick="hide(${i})">
${a.hidden ? "Unhide" : "Hide"}
</button>

<button onclick="del(${i})" style="background:red;color:white;">
Delete
</button>

</div>
`;
});
}

/* ===== HISTORY (IMMUTABLE) ===== */
let history = get("history");

if(history.length === 0){
historyDiv.innerHTML = "<div class='card'>No history yet</div>";
} else {

history.forEach(h=>{
historyDiv.innerHTML += `
<div class="card">
<b>${h.role || "-"}</b><br>
${h.discord || "-"}<br>
${h.roblox || "-"}<br>
${h.date || "-"}
</div>
`;
});
}

}

/* ================= TAB SWITCH ================= */
function show(i){

["status","apps","history"].forEach((id,j)=>{
document.getElementById(id).style.display = (j===i) ? "block" : "none";
});

document.querySelectorAll(".tab").forEach((t,j)=>{
t.classList.toggle("active", j===i);
});

}

/* INIT */
load();

</script>

</body>
</html>
