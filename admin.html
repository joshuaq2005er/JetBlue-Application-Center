<!DOCTYPE html>
<html>
<head>
<title>JetBlue Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef6ff;
}

.header{
background:#0073e6;
color:white;
padding:20px;
text-align:center;
}

.tabs{
display:flex;
justify-content:center;
background:white;
}

.tab{
padding:10px 15px;
margin:5px;
cursor:pointer;
background:#eee;
border-radius:8px;
}

.active{
background:#0073e6;
color:white;
}

.container{
width:90%;
margin:auto;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

button{
padding:6px 10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

#modalBox{
background:white;
width:750px;
margin:60px auto;
padding:20px;
border-radius:12px;
max-height:80vh;
overflow:auto;
}
</style>
</head>

<body>

<div class="header">
<h2>JetBlue Admin Dashboard</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab(0)">Status</div>
<div class="tab" onclick="showTab(1)">Applications</div>
<div class="tab" onclick="showTab(2)">History</div>
</div>

<div class="container">

<div id="status"></div>
<div id="apps" style="display:none;"></div>
<div id="history" style="display:none;"></div>

</div>

<!-- MODAL -->
<div id="modal">
<div id="modalBox">
<h3>Application Details</h3>
<div id="modalContent"></div>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* PASSWORD */
let pass = prompt("Admin Password:");

if(pass !== "JB123478JBC"){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:100px'>ACCESS DENIED</h1>";
throw new Error();
}

/* STATUS */
function getStatus(role){
let s=localStorage.getItem("roleStatus_"+role);
if(!s){
localStorage.setItem("roleStatus_"+role,"OPEN");
return "OPEN";
}
return s;
}

function toggleStatus(role){
let s=getStatus(role);
localStorage.setItem("roleStatus_"+role, s==="OPEN"?"CLOSED":"OPEN");
load();
}

/* LOAD ALL APPLICATIONS */
function load(){

let fdApps = JSON.parse(localStorage.getItem("flightdeck_apps") || "[]");
let ccApps = JSON.parse(localStorage.getItem("cabincrew_apps") || "[]");

let apps = [
...fdApps.map(a=>({...a,type:"Flight Deck"})),
...ccApps.map(a=>({...a,type:"Cabin Crew"}))
];

let roles=["Flight Deck","Cabin Crew","Ground Crew"];

let statusDiv=document.getElementById("status");
let appsDiv=document.getElementById("apps");
let historyDiv=document.getElementById("history");

statusDiv.innerHTML="";
appsDiv.innerHTML="";
historyDiv.innerHTML="";

/* STATUS */
roles.forEach(r=>{
let s=getStatus(r);

statusDiv.innerHTML+=`
<div class="card">
<b>${r}</b><br>
Status: <b style="color:${s==='OPEN'?'green':'red'}">${s}</b><br>
<button onclick="toggleStatus('${r}')">Toggle</button>
</div>
`;
});

/* STORE GLOBALLY */
window.allApps=apps;

/* APPLICATIONS */
apps.forEach((a,i)=>{

appsDiv.innerHTML+=`
<div class="card">

<h3>${a.type}</h3>

<b>Discord:</b> ${a.discord || a.ccdiscord || ""}<br>
<b>Roblox:</b> ${a.roblox || a.ccroblox || ""}<br>
<b>Date:</b> ${a.date}<br>

<button onclick="showMore(${i})" style="background:#0073e6;color:white;">
Show Full Application
</button>

</div>
`;
});

/* HISTORY */
historyDiv.innerHTML=apps.map(h=>`
<div class="card">
<b>${h.type}</b><br>
${h.discord || h.ccdiscord || ""}<br>
${h.roblox || h.ccroblox || ""}<br>
${h.date}
</div>
`).join("");

}

/* FULL VIEW */
function showMore(i){

let a=window.allApps[i];

let html="";

if(a.type==="Flight Deck"){

html=`
<h3>✈ FLIGHT DECK APPLICATION</h3>

Discord: ${a.discord}<br>
Discord ID: ${a.discordid}<br>
Roblox: ${a.roblox}<br>
Time: ${a.time}<br>
Age: ${a.age}<br>
Proof: ${a.proof}<br><br>

Timezone: ${a.timezone}<br>
Roblox Act: ${a.robloxact}<br>
Discord Act: ${a.discordact}<br>
Device: ${a.device}<br>
Grammar: ${a.grammar}<br><br>

Words: ${a.words}<br>
Experience: ${a.exp}<br>
Mic: ${a.mic}<br>
Why: ${a.why}<br>
Standout: ${a.standout}<br>
Strengths: ${a.strengths}<br><br>

Flaps: ${a.flaps}<br>
VFR: ${a.vfr}<br>
ILS: ${a.ils}<br>
Chart: ${a.chart}<br>
Callouts: ${a.callouts}<br>
Flightplan: ${a.flightplan}<br><br>

S1: ${a.s1}<br>
S2: ${a.s2}<br>
S3: ${a.s3}<br>
`;
}

if(a.type==="Cabin Crew"){

html=`
<h3>💺 CABIN CREW APPLICATION</h3>

Discord: ${a.ccdiscord}<br>
Discord ID: ${a.ccdiscordid}<br>
Roblox: ${a.ccroblox}<br>
Time: ${a.cctime}<br>
Age: ${a.ccage}<br><br>

Timezone: ${a.cctimezone}<br>
Roblox Act: ${a.ccrobloxact}<br>
Discord Act: ${a.ccdiscordact}<br>
Device: ${a.ccdevice}<br>
Grammar: ${a.ccgrammar}<br><br>

About: ${a.ccwords}<br>
Experience: ${a.ccexp}<br>
Why: ${a.ccwhy}<br>
Standout: ${a.ccstandout}<br>
Strengths: ${a.ccstrengths}<br><br>

S1: ${a.ccs1}<br>
S2: ${a.ccs2}<br>
S3: ${a.ccs3}<br>
S4: ${a.ccs4}<br>
`;
}

document.getElementById("modalContent").innerHTML=html;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* TABS */
function showTab(i){

["status","apps","history"].forEach((id,j)=>{
document.getElementById(id).style.display=(i===j)?"block":"none";
});

document.querySelectorAll(".tab").forEach((t,j)=>{
t.classList.toggle("active",i===j);
});

}

load();

</script>

</body>
</html>
