<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#eef6ff;margin:0;}

.header{
background:#0073e6;
color:white;
padding:20px;
text-align:center;
}

.tabs{
display:flex;
justify-content:center;
background:white;
}

.tab{
padding:10px;
margin:5px;
background:#eee;
cursor:pointer;
}

.active{background:#0073e6;color:white;}

.container{width:90%;margin:auto;}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Admin Dashboard</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="show(0)">Status</div>
<div class="tab" onclick="show(1)">Applications</div>
<div class="tab" onclick="show(2)">History</div>
</div>

<div class="container" id="status"></div>
<div class="container" id="apps" style="display:none;"></div>
<div class="container" id="history" style="display:none;"></div>

<script>

let pass=prompt("Admin Password:");
if(pass!=="1234"){
document.body.innerHTML="DENIED";
throw new Error();
}

function get(k){return JSON.parse(localStorage.getItem(k)||"[]");}

function toggle(role){
let s=localStorage.getItem("role_"+role)||"OPEN";
localStorage.setItem("role_"+role,s==="OPEN"?"CLOSED":"OPEN");
load();
}

function load(){

let roles=["Flight Deck","Cabin Crew","Ground Crew"];

let statusDiv=document.getElementById("status");
let appsDiv=document.getElementById("apps");
let historyDiv=document.getElementById("history");

statusDiv.innerHTML="";
appsDiv.innerHTML="";
historyDiv.innerHTML="";

// STATUS
roles.forEach(r=>{
let s=localStorage.getItem("role_"+r)||"OPEN";

statusDiv.innerHTML+=`
<div class="card">
<b>${r}</b> - ${s}
<button onclick="toggle('${r}')">Toggle</button>
</div>
`;
});

// APPLICATIONS (FULL ANSWERS)
get("apps").forEach(a=>{
appsDiv.innerHTML+=`
<div class="card">

<h3>${a.role}</h3>

<b>Discord:</b> ${a.discord}<br>
<b>Roblox:</b> ${a.roblox}<br>
<b>Time:</b> ${a.time}<br>
<b>Age:</b> ${a.age}<br><br>

<b>WHY:</b><br>${a.why}<br><br>

<b>FLIGHT:</b><br>
Flaps: ${a.flaps}<br>
VFR: ${a.vfr}<br>
ILS: ${a.ils}<br>
Chart: ${a.chart}<br>
Callouts: ${a.callouts}<br>
Plan: ${a.plan}<br><br>

<b>SCENARIOS:</b><br>
${a.disturb}<br>
${a.fire}<br>
${a.trolls}

</div>
`;
});

// HISTORY
get("history").forEach(a=>{
historyDiv.innerHTML+=`
<div class="card">
<b>${a.role}</b><br>
${a.discord}<br>
${a.roblox}<br>
${a.date}
</div>
`;
});

}

function show(i){

["status","apps","history"].forEach((id,j)=>{
document.getElementById(id).style.display=j===i?"block":"none";
});

document.querySelectorAll(".tab").forEach((t,j)=>{
t.classList.remove("active");
if(i===j)t.classList.add("active");
});

}

load();

</script>

</body>
</html>
