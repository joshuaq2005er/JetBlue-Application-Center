<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eef6ff;
    }

    .header {
      background: #0073e6;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .tabs {
      display: flex;
      justify-content: center;
      background: white;
      padding: 10px;
      gap: 10px;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 8px;
      background: #eee;
      font-weight: bold;
    }

    .active {
      background: #0073e6;
      color: white;
    }

    .container {
      width: 90%;
      margin: 20px auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.08);
    }

    .label {
      font-weight: bold;
      color: #0073e6;
    }

    select, button {
      margin-top: 8px;
      padding: 6px;
    }

    button {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>JetBlue Admin Dashboard</h1>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('status')">Status Control</div>
  <div class="tab" onclick="showTab('apps')">Applications</div>
</div>

<!-- STATUS TAB -->
<div class="container" id="statusTab"></div>

<!-- APPLICATIONS TAB -->
<div class="container hidden" id="appsTab"></div>

<script>

function safe(v){ return v ? v : "Not provided"; }

function load() {
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  let statusTab = document.getElementById("statusTab");
  let appsTab = document.getElementById("appsTab");

  statusTab.innerHTML = "";
  appsTab.innerHTML = "";

  apps.forEach(app => {

    // ================= STATUS TAB =================
    statusTab.innerHTML += `
      <div class="card">
        <div><span class="label">Role:</span> ${safe(app.role)}</div>
        <div><span class="label">Status:</span> ${safe(app.status)}</div>

        <select onchange="update(${app.id}, this.value)">
          <option ${app.status==="Pending"?"selected":""}>Pending</option>
          <option ${app.status==="Accepted"?"selected":""}>Accepted</option>
          <option ${app.status==="Denied"?"selected":""}>Denied</option>
        </select>

        <button onclick="del(${app.id})">Delete</button>
      </div>
    `;

    // ================= APPLICATION VIEW TAB =================
    appsTab.innerHTML += `
      <div class="card">

        <div><span class="label">Role:</span> ${safe(app.role)}</div>
        <div><span class="label">Status:</span> ${safe(app.status)}</div>
        <div><span class="label">Date:</span> ${safe(app.date)}</div>

        <hr>

        <div><span class="label">Discord:</span> ${safe(app.discord)}</div>
        <div><span class="label">Roblox:</span> ${safe(app.roblox)}</div>
        <div><span class="label">Flight Time:</span> ${safe(app.time)}</div>

        <hr>

        <div><span class="label">Why they applied:</span><br>${safe(app.why)}</div>
        <br>
        <div><span class="label">Strengths:</span><br>${safe(app.strengths)}</div>

      </div>
    `;
  });
}

function update(id, status){
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps = apps.map(a=>{
    if(a.id === id) a.status = status;
    return a;
  });

  localStorage.setItem("applications", JSON.stringify(apps));
  load();
}

function del(id){
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps = apps.filter(a => a.id !== id);

  localStorage.setItem("applications", JSON.stringify(apps));
  load();
}

// TAB SWITCHING
function showTab(tab){
  document.getElementById("statusTab").classList.add("hidden");
  document.getElementById("appsTab").classList.add("hidden");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  if(tab === "status"){
    document.getElementById("statusTab").classList.remove("hidden");
    document.querySelectorAll(".tab")[0].classList.add("active");
  }

  if(tab === "apps"){
    document.getElementById("appsTab").classList.remove("hidden");
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
}

load();

</script>

</body>
</html>
