<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eef6ff;
    }

    .header {
      background: #0073e6;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      width: 90%;
      margin: 20px auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.08);
    }

    select, button {
      margin-top: 8px;
      padding: 6px;
    }

    button {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>JetBlue Admin Dashboard</h1>
</div>

<div class="container" id="list"></div>

<script>

function load() {
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");
  let list = document.getElementById("list");

  list.innerHTML = "";

  apps.forEach(app => {

    list.innerHTML += `
      <div class="card">
        <b>Role:</b> ${app.role}<br>
        <b>Date:</b> ${app.date}<br>
        <b>Status:</b> ${app.status}<br>

        <select onchange="change(${app.id}, this.value)">
          <option ${app.status==="Pending"?"selected":""}>Pending</option>
          <option ${app.status==="Reviewed"?"selected":""}>Reviewed</option>
          <option ${app.status==="Closed"?"selected":""}>Closed</option>
        </select>

        <button onclick="del(${app.id})">Delete</button>
      </div>
    `;
  });
}

function change(id, status) {
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps = apps.map(a => {
    if (a.id === id) a.status = status;
    return a;
  });

  localStorage.setItem("applications", JSON.stringify(apps));
  load();
}

function del(id) {
  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps = apps.filter(a => a.id !== id);

  localStorage.setItem("applications", JSON.stringify(apps));
  load();
}

load();

</script>

</body>
</html>
