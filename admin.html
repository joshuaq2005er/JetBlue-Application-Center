<!DOCTYPE html>
<html>
<head>
<title>JetBlue Admin Dashboard</title>

<style>
body{
font-family:Arial;
background:#eef6ff;
margin:0;
}

.header{
background:#0073e6;
color:white;
text-align:center;
padding:20px;
}

.tabs{
display:flex;
justify-content:center;
background:white;
}

.tab{
padding:10px 15px;
margin:5px;
background:#eee;
cursor:pointer;
border-radius:6px;
}

.active{
background:#0073e6;
color:white;
}

.container{
width:90%;
margin:auto;
padding-top:10px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:6px 10px;
background:#0073e6;
color:white;
border:none;
cursor:pointer;
margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
<h2>JetBlue Admin Dashboard</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab(0)">Status</div>
<div class="tab" onclick="showTab(1)">Applications</div>
<div class="tab" onclick="showTab(2)">History</div>
</div>

<div class="container" id="statusTab"></div>
<div class="container" id="appsTab" style="display:none;"></div>
<div class="container" id="historyTab" style="display:none;"></div>

<script>

/* ================= LOGIN ================= */
let pass = prompt("Admin Password:");
if(pass !== "1234"){
document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:100px;'>ACCESS DENIED</h1>";
throw new Error();
}

/* ================= DATA ================= */
function get(key){
return JSON.parse(localStorage.getItem(key) || "[]");
}

/* ================= STATUS ================= */
function toggle(role){
let current = localStorage.getItem("role_" + role) || "OPEN";
let newStatus = current === "OPEN" ? "CLOSED" : "OPEN";
localStorage.setItem("role_" + role, newStatus);
load();
}

/* ================= LOAD ================= */
function load(){

const statusTab = document.getElementById("statusTab");
const appsTab = document.getElementById("appsTab");
const historyTab = document.getElementById("historyTab");

statusTab.innerHTML = "";
appsTab.innerHTML = "";
historyTab.innerHTML = "";

/* ROLES */
let roles = ["Flight Deck","Cabin Crew","Ground Crew"];

roles.forEach(role=>{
let status = localStorage.getItem("role_" + role) || "OPEN";

statusTab.innerHTML += `
<div class="card">
<b>${role}</b><br>
Status: ${status}<br>
<button onclick="toggle('${role}')">Toggle OPEN/CLOSED</button>
</div>
`;
});

/* APPLICATIONS (FULL ANSWERS) */
let apps = get("apps");

if(apps.length === 0){
appsTab.innerHTML = "<div class='card'>No applications yet</div>";
} else {

apps.forEach(a=>{
appsTab.innerHTML += `
<div class="card">

<h3>${a.role}</h3>

<b>Discord:</b> ${a.discord || ""}<br>
<b>Discord ID:</b> ${a.discordid || ""}<br>
<b>Roblox:</b> ${a.roblox || ""}<br>
<b>Time:</b> ${a.time || ""}<br>
<b>Age:</b> ${a.age || ""}<br>
<b>Date:</b> ${a.date || ""}<br>

<hr>

<b>WHY APPLY:</b><br>${a.why || ""}<br><br>

<b>STRENGTHS:</b><br>${a.strengths || ""}<br><br>

<hr>

<b>FLIGHT QUESTIONS</b><br>
Flaps: ${a.flaps || ""}<br>
VFR/IFR: ${a.vfr || ""}<br>
ILS: ${a.ils || ""}<br>
Chart: ${a.chart || ""}<br>
Callouts: ${a.callouts || ""}<br>
Flight Plan: ${a.plan || ""}<br><br>

<b>SCENARIOS</b><br>
Disturbance: ${a.disturb || ""}<br>
Fire: ${a.fire || ""}<br>
Trolls: ${a.trolls || ""}

</div>
`;
});
}

/* HISTORY */
let history = get("history");

if(history.length === 0){
historyTab.innerHTML = "<div class='card'>No history yet</div>";
} else {

history.forEach(a=>{
historyTab.innerHTML += `
<div class="card">
<b>${a.role}</b><br>
${a.discord || ""}<br>
${a.roblox || ""}<br>
${a.date || ""}
</div>
`;
});
}

}

/* ================= TABS ================= */
function showTab(i){

document.getElementById("statusTab").style.display = i===0 ? "block" : "none";
document.getElementById("appsTab").style.display = i===1 ? "block" : "none";
document.getElementById("historyTab").style.display = i===2 ? "block" : "none";

document.querySelectorAll(".tab").forEach((t,index)=>{
t.classList.remove("active");
if(index===i)t.classList.add("active");
});

}

/* INIT */
load();

</script>

</body>
</html>
