<!DOCTYPE html>
<html>
<head>
<title>JetBlue Cabin Crew Application</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#dff1ff,#f7fbff);
}

.container{
width:900px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
text-align:center;
color:#0073e6;
}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
}

button{
padding:12px 18px;
background:#0073e6;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:10px;
}

.nav{
display:flex;
justify-content:space-between;
}

.error{
color:red;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>JetBlue Cabin Crew Application</h2>

<div id="form"></div>

</div>
</div>

<script>

let role="Cabin Crew";

let status=localStorage.getItem("roleStatus_"+role)||"OPEN";

if(status==="CLOSED"){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:100px'>APPLICATION CLOSED</h1>";
throw new Error();
}

document.getElementById("form").innerHTML=`

<div class="section active">
<h3>Section 1 of 6</h3>

<pre style="white-space:pre-wrap;font-family:Arial;line-height:1.4">
JetBlue Cabin Crew Application
Welcome to the JetBlue Cabin Crew Application Form!
</pre>

<button onclick="next()">Continue</button>
</div>

<div class="section">
<h3>Section 2 of 6 - Applicant Information</h3>

<input id="ccdiscord" placeholder="What is your discord username? *">
<input id="ccdiscordid" placeholder="Please provide your discord ID. *">
<input id="ccroblox" placeholder="What is your roblox username? *">
<input id="cctime" placeholder="How much PTFS flight time do you have? *">

<select id="ccage">
<option value="">Age group *</option>
<option>13-15</option>
<option>16-17</option>
<option>18-20</option>
<option>21+</option>
<option>Other</option>
</select>

<div class="error" id="e2"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v2()">Next</button>
</div>
</div>

<div class="section">
<h3>Section 3 of 6 - Activity</h3>

<input id="cctimezone" placeholder="What timezone are you in? *">
<input id="ccrobloxact" placeholder="Rate Roblox activity 1-5 *">
<input id="ccdiscordact" placeholder="Rate Discord activity 1-5 *">
<input id="ccdevice" placeholder="Device type *">
<input id="ccgrammar" placeholder="Grammar 1-5 *">

<div class="error" id="e3"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v3()">Next</button>
</div>
</div>

<div class="section">
<h3>Section 4 of 6 - About You</h3>

<textarea id="ccwords" placeholder="Describe yourself (2+ sentences)."></textarea>

<select id="ccexp">
<option value="">Do you have experience? *</option>
<option>Yes</option>
<option>No</option>
</select>

<textarea id="ccwhy" placeholder="Why JetBlue? *"></textarea>
<textarea id="ccstandout" placeholder="What makes you stand out? *"></textarea>
<textarea id="ccstrengths" placeholder="Strengths and weaknesses *"></textarea>

<div class="error" id="e4"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v4()">Next</button>
</div>
</div>

<div class="section">
<h3>Section 5 of 6 - Scenarios</h3>

<textarea id="ccs1" placeholder="Cruising job? *"></textarea>
<textarea id="ccs2" placeholder="Passenger request not served? *"></textarea>
<textarea id="ccs3" placeholder="Disturbance? *"></textarea>
<textarea id="ccs4" placeholder="Emergency role? *"></textarea>

<div class="error" id="e6"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v6()">Next</button>
</div>
</div>

<div class="section">
<h3>Section 6 of 6 - Agreements</h3>

<select id="ccagree1">
<option value="">Do you agree to not leak documents? *</option>
<option>Yes</option><option>No</option><option>Maybe</option>
</select>

<select id="ccagree2">
<option value="">Do you agree to follow rules? *</option>
<option>Yes</option><option>No</option><option>Maybe</option>
</select>

<div class="error" id="e7"></div>

<button onclick="submit()">Submit Application</button>

</div>
`;

let sections=document.querySelectorAll(".section");
let c=0;

function show(){
sections.forEach((s,i)=>s.classList.toggle("active",i===c));
}

function next(){if(c<sections.length-1)c++;show();}
function back(){if(c>0)c--;show();}

function v2(){
if(!ccdiscord.value||!ccdiscordid.value||!ccroblox.value||!cctime.value||!ccage.value){
e2.innerText="Fill all fields";return;
}
e2.innerText="";next();
}

function v3(){
if(!cctimezone.value||!ccrobloxact.value||!ccdiscordact.value||!ccdevice.value||!ccgrammar.value){
e3.innerText="Fill all fields";return;
}
e3.innerText="";next();
}

function v4(){
if(!ccwords.value||!ccexp.value||!ccwhy.value||!ccstandout.value||!ccstrengths.value){
e4.innerText="Fill all fields";return;
}
e4.innerText="";next();
}

function v6(){
if(!ccs1.value||!ccs2.value||!ccs3.value||!ccs4.value){
e6.innerText="Fill all fields";return;
}
e6.innerText="";next();
}

/* SUBMIT FIXED */
function submit(){

if(!ccagree1.value||!ccagree2.value){
e7.innerText="Complete agreements";return;
}

let apps=JSON.parse(localStorage.getItem("apps")||"[]");

apps.push({
role,

ccdiscord:ccdiscord.value,
ccdiscordid:ccdiscordid.value,
ccroblox:ccroblox.value,
cctime:cctime.value,
ccage:ccage.value,

cctimezone:cctimezone.value,
ccrobloxact:ccrobloxact.value,
ccdiscordact:ccdiscordact.value,
ccdevice:ccdevice.value,
ccgrammar:ccgrammar.value,

ccwords:ccwords.value,
ccexp:ccexp.value,
ccwhy:ccwhy.value,
ccstandout:ccstandout.value,
ccstrengths:ccstrengths.value,

ccs1:ccs1.value,
ccs2:ccs2.value,
ccs3:ccs3.value,
ccs4:ccs4.value,

ccagree1:ccagree1.value,
ccagree2:ccagree2.value,

date:new Date().toLocaleString(),
hidden:false,
deleted:false
});

localStorage.setItem("apps",JSON.stringify(apps));

let history=JSON.parse(localStorage.getItem("history")||"[]");
history.push(apps[apps.length-1]);
localStorage.setItem("history",JSON.stringify(history));

alert("Submitted!");
location.href="cabin.html";
}

</script>
</body>
</html>
