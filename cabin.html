<!DOCTYPE html>
<html>
<head>
<title>Cabin Crew Application</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#dff1ff,#f7fbff);
}

.container{width:900px;margin:40px auto;}
.card{background:white;padding:30px;border-radius:18px;}
h2{text-align:center;color:#0073e6;}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ddd;
}

button{
padding:12px;
background:#0073e6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.error{color:red;font-size:13px;}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Cabin Crew Application</h2>
<div id="form"></div>

</div>
</div>

<script>

let role="Cabin Crew";

/* SECTION 1 */
document.getElementById("form").innerHTML=`

<div class="section active">
<h3>Section 1</h3>
<pre>
JetBlue Cabin Crew Application
No AI allowed.
Failure = blacklist.
</pre>
<button onclick="next()">Continue</button>
</div>

<!-- SECTION 2 -->
<div class="section">
<h3>Section 2</h3>

<input id="discord" placeholder="Discord username *">
<input id="discordid" placeholder="Discord ID *">
<input id="roblox" placeholder="Roblox username *">
<input id="time" placeholder="PTFS time *">

<select id="age">
<option value="">Age *</option>
<option>13-15</option>
<option>16-17</option>
<option>18-20</option>
<option>21+</option>
</select>

<button onclick="next()">Next</button>
</div>

<!-- SECTION 3 -->
<div class="section">
<h3>Section 3</h3>

<input id="timezone" placeholder="Timezone *">
<input id="robloxact" placeholder="Roblox activity 1-5 *">
<input id="discordact" placeholder="Discord activity 1-5 *">
<input id="device" placeholder="Device *">
<input id="grammar" placeholder="Grammar 1-5 *">

<button onclick="next()">Next</button>
</div>

<!-- SECTION 4 -->
<div class="section">
<h3>Section 4</h3>

<textarea id="words" placeholder="3 words *"></textarea>
<select id="exp"><option value="">Experience *</option><option>Yes</option><option>No</option></select>
<select id="mic"><option value="">Mic *</option><option>Yes</option><option>No</option></select>

<textarea id="why" placeholder="Why JetBlue? *"></textarea>
<textarea id="standout" placeholder="Stand out? *"></textarea>
<textarea id="strengths" placeholder="Strengths & Weaknesses *"></textarea>

<button onclick="next()">Next</button>
</div>

<!-- SECTION 5 (YOUR QUESTIONS - UNCHANGED) -->
<div class="section">
<h3>Section 5 - Cabin Crew Questions</h3>

<textarea id="s1" placeholder="Once the plane is cruising, what would your job be as a caterer? *"></textarea>
<textarea id="s2" placeholder="If a passenger asks for something you don't serve, what would you do? *"></textarea>
<textarea id="s3" placeholder="If a passenger is causing disturbance, what should you do? *"></textarea>
<textarea id="s4" placeholder="During an emergency, what is your role? *"></textarea>

<button onclick="next()">Next</button>
</div>

<!-- SECTION 6 -->
<div class="section">
<h3>Section 6</h3>

<select id="agree1"><option value="">Agree no leak *</option><option>Yes</option></select>
<select id="agree2"><option value="">Follow rules *</option><option>Yes</option></select>

<button onclick="submit()">Submit</button>
</div>

`;

/* NAV */
let sections=document.querySelectorAll(".section");
let c=0;
function next(){if(c<sections.length-1)c++;show();}
function show(){sections.forEach((s,i)=>s.classList.toggle("active",i===c));}

/* SUBMIT */
function submit(){

let apps=JSON.parse(localStorage.getItem("apps")||"[]");

apps.push({
role:"Cabin Crew",
discord:discord.value,
discordid:discordid.value,
roblox:roblox.value,
time:time.value,
age:age.value,
proof:proof.value,
timezone:timezone.value,
robloxact:robloxact.value,
discordact:discordact.value,
device:device.value,
grammar:grammar.value,
words:words.value,
exp:exp.value,
mic:mic.value,
why:why.value,
standout:standout.value,
strengths:strengths.value,
s1:s1.value,
s2:s2.value,
s3:s3.value,
s4:s4.value,
agree1:agree1.value,
agree2:agree2.value,
date:new Date().toLocaleString(),
hidden:false,
deleted:false
});

localStorage.setItem("apps",JSON.stringify(apps));

alert("Submitted!");
location.href="index.html";
}

</script>

</body>
</html>
