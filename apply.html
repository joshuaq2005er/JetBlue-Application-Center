<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Application</title>

  <style>
    body { font-family: Arial; background:#eef6ff; margin:0; }
    .container { width:750px; margin:40px auto; }
    .box { background:white; padding:20px; border-radius:10px; }

    input, textarea, select {
      width:100%; padding:10px; margin:8px 0;
    }

    button {
      width:100%; padding:12px;
      background:#0073e6; color:white;
      border:none;
    }
  </style>
</head>

<body>

<div class="container">

<div class="box">

<h2 id="roleTitle"></h2>

<form onsubmit="submitApp(event)">

<input id="discord" placeholder="Discord Username">
<input id="roblox" placeholder="Roblox Username">
<input id="time" type="number" placeholder="PTFS Flight Time">

<textarea id="why" placeholder="Why do you want to join?"></textarea>
<textarea id="strengths" placeholder="Strengths & Weaknesses"></textarea>

<select id="agree">
  <option>Yes</option>
  <option>No</option>
</select>

<button>Submit</button>

</form>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const role = params.get("role");
const status = params.get("status");

document.getElementById("roleTitle").innerText =
"Applying for: " + role + " (" + status.toUpperCase() + ")";

function submitApp(e){
  e.preventDefault();

  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps.push({
    id: Date.now(),
    role,
    status: "Pending",

    discord: discord.value,
    roblox: roblox.value,
    time: time.value,
    why: why.value,
    strengths: strengths.value,
    agree: agree.value,

    date: new Date().toLocaleString()
  });

  localStorage.setItem("applications", JSON.stringify(apps));

  alert("Submitted!");
  location.href = "index.html";
}

</script>

</body>
</html>
