<!DOCTYPE html>
<html>
<head>
  <title>Apply - JetBlue Careers</title>

  <style>
    body {
      font-family: Arial;
      background: #eef6ff;
      text-align: center;
    }

    .box {
      width: 420px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0073e6;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .role {
      font-weight: bold;
      margin-bottom: 10px;
      color: #444;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>Application Form</h1>

  <div class="role" id="roleText"></div>

  <form onsubmit="saveApplication(event)">
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Why do you want to join?" required></textarea>
    <button type="submit">Submit Application</button>
  </form>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const role = params.get("role");
document.getElementById("roleText").innerText = "Applying for: " + role;

function saveApplication(event) {
  event.preventDefault();

  const name = document.querySelector("input[type='text']").value;
  const email = document.querySelector("input[type='email']").value;
  const message = document.querySelector("textarea").value;

  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps.push({
    id: Date.now(),
    role,
    name,
    email,
    message,
    status: "Pending",
    date: new Date().toLocaleString()
  });

  localStorage.setItem("applications", JSON.stringify(apps));

  alert("Application submitted!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
