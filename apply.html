<!DOCTYPE html>
<html>
<head>
<title>JetBlue Application</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#dff1ff,#f7fbff);
}

.container{
width:900px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
text-align:center;
color:#0073e6;
}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
}

button{
padding:12px 18px;
background:#0073e6;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:10px;
}

.nav{
display:flex;
justify-content:space-between;
}

.error{
color:red;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>JetBlue Flight Deck Application</h2>

<div id="form"></div>

</div>
</div>

<script>

let role="Flight Deck";

/* STATUS CHECK */
let status=localStorage.getItem("roleStatus_"+role)||"OPEN";

if(status==="CLOSED"){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:100px'>APPLICATION CLOSED</h1>";
throw new Error();
}

/* FORM */
document.getElementById("form").innerHTML=`

<!-- SECTION 1 -->
<div class="section active">

<h3>Section 1 of 7</h3>

<pre style="white-space:pre-wrap;font-family:Arial;line-height:1.4">

JetBlue Flight Deck Application
Welcome to the JetBlue Flight Deck Application Form!

This Application is for individuals wanting to serve for JetBlue as a Flight Deck.
This form should only be used as application as Flight Deck, and not to be used for anything else.

Any Questions?
Open a ticket in the main server.

Before You Start Your Application, We've Got Some Requirements:
- Age 13+
- Must Have Proficient SPaG (Spelling, Punctuation and Grammar)
- 600+ Minutes In PTFS
- Previous Experience In The Air Industry Is Recommended.
- No use of AI*.
- Asking For The Current Status Of Your Application Results Is An Immediate Failure.

Good Luck!

* The use of AI results in an immediate failure and a blacklist from all applications
This form is automatically collecting emails from all respondents.Change settings

</pre>

<button onclick="next()">Continue</button>

</div>

<!-- SECTION 2 -->
<div class="section">
<h3>Section 2 of 7 - Applicant Information</h3>

<input id="discord" placeholder="What is your discord username? *">
<input id="discordid" placeholder="Please provide your discord ID. If you do not know how, ask for assistance in support.*">
<input id="roblox" placeholder="What is your roblox username?*">
<input id="time" placeholder="How much PTFS flight time do you have?*">

<select id="age">
<option value="">Age group *</option>
<option>13-15</option>
<option>16-17</option>
<option>18-20</option>
<option>21+</option>
<option>Other</option>
</select>

<input id="proof" placeholder="Send a photo link for Outfit Picker proof*">

<div class="error" id="e2"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v2()">Next</button>
</div>
</div>

<!-- SECTION 3 -->
<div class="section">
<h3>Section 3 of 7 - Activity</h3>

<input id="timezone" placeholder="What timezone are you in?*">
<input id="robloxact" placeholder="Rate your roblox activity daily. 1-5 *">
<input id="discordact" placeholder="Rate your discord activity daily. 1-5 *">
<input id="device" placeholder="What device type will you attend flights on to pilot primarily? type *">
<input id="grammar" placeholder="Rate your grammar proficiency. 1-5 *">

<div class="error" id="e3"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v3()">Next</button>
</div>
</div>

<!-- SECTION 4 -->
<div class="section">
<h3>Section 4 of 7 - About You</h3>

<textarea id="words" placeholder="What are 3 words staff will describe you as?*"></textarea>

<select id="exp">
<option value="">Do you have ANY previous experience with PTC groups as flight deck or VATSIM/ATC24. *</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="mic">
<option value="">Do you have a functioning microphone?? *</option>
<option>Yes</option>
<option>No</option>
</select>

<textarea id="why" placeholder="Why do you want to work at JetBlue? (2 sentences required) *"></textarea>
<textarea id="standout" placeholder="What makes you stand out over other applicants? (2+ sentences required) *"></textarea>
<textarea id="strengths" placeholder="What are your weaknesses and strengths? (2+ each)*"></textarea>

<div class="error" id="e4"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v4()">Next</button>
</div>
</div>

<!-- SECTION 5 -->
<div class="section">
<h3>Section 5 of 7 - Flight Knowledge</h3>

<textarea id="flaps" placeholder="Explain when to retract flaps. *"></textarea>
<textarea id="vfr" placeholder="Explain what VFR and IFR mean. *"></textarea>
<textarea id="ils" placeholder="What does ILS stand for and when is it used? *"></textarea>
<textarea id="chart" placeholder="What is the point of a airport chart? *"></textarea>
<textarea id="callouts" placeholder="Choose the appropriate callouts needed during the takeoff roll. *"></textarea>
<textarea id="flightplan" placeholder="What is a flight plan and why are they crucial? *"></textarea>

<div class="error" id="e5"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v5()">Next</button>
</div>
</div>

<!-- SECTION 6 -->
<div class="section">
<h3>Section 6 of 7 - Scenarios</h3>

<textarea id="s1" placeholder="What would you do if a passenger was causing disturbance on the plane however you were still in the air?*"></textarea>
<textarea id="s2" placeholder="What would you do if suddenly an engine caught on fire?*"></textarea>
<textarea id="s3" placeholder="What would you do if there was trollers aboard the flight attempting to ruin it?*"></textarea>

<div class="error" id="e6"></div>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="v6()">Next</button>
</div>
</div>

<!-- SECTION 7 -->
<div class="section">
<h3>Section 7 of 7 - Agreements</h3>

<select id="agree1">
<option value="">Do you agree to not leak ANY documents provided?*</option>
<option>Yes</option><option>No</option><option>Maybe</option>
</select>

<select id="agree2">
<option value="">Do you agree to follow all rules as a flight deck if accepted?*</option>
<option>Yes</option><option>No</option><option>Maybe</option>
</select>

<div class="error" id="e7"></div>

<button onclick="submit()">Submit Application</button>

</div>

`;

let sections=document.querySelectorAll(".section");
let c=0;

function show(){
sections.forEach((s,i)=>s.classList.toggle("active",i===c));
}

function next(){if(c<sections.length-1)c++;show();}
function back(){if(c>0)c--;show();}

/* VALIDATION */
function v2(){
if(!discord.value||!discordid.value||!roblox.value||!time.value||!age.value||!proof.value){
e2.innerText="Fill all fields";return;
}
e2.innerText="";next();
}

function v3(){
if(!timezone.value||!robloxact.value||!discordact.value||!device.value||!grammar.value){
e3.innerText="Fill all fields";return;
}
e3.innerText="";next();
}

function v4(){
if(!words.value||!exp.value||!mic.value||!why.value||!standout.value||!strengths.value){
e4.innerText="Fill all fields";return;
}
e4.innerText="";next();
}

function v5(){
if(!flaps.value||!vfr.value||!ils.value||!chart.value||!callouts.value||!flightplan.value){
e5.innerText="Fill all fields";return;
}
e5.innerText="";next();
}

function v6(){
if(!s1.value||!s2.value||!s3.value){
e6.innerText="Fill all fields";return;
}
e6.innerText="";next();
}

/* SUBMIT */
function submit(){

if(!agree1.value||!agree2.value){
e7.innerText="Complete agreements";return;
}

let apps=JSON.parse(localStorage.getItem("apps")||"[]");

apps.push({
role,
discord:discord.value,
discordid:discordid.value,
roblox:roblox.value,
time:time.value,
age:age.value,
why:why.value,
flaps:flaps.value,
vfr:vfr.value,
ils:ils.value,
chart:chart.value,
callouts:callouts.value,
flightplan:flightplan.value,
s1:s1.value,
s2:s2.value,
s3:s3.value,
date:new Date().toLocaleString(),
hidden:false,
deleted:false
});

localStorage.setItem("apps",JSON.stringify(apps));

let history=JSON.parse(localStorage.getItem("history")||"[]");
history.push(apps[apps.length-1]);
localStorage.setItem("history",JSON.stringify(history));

alert("Submitted!");
location.href="index.html";
}
  
</script>

</body>
</html>
