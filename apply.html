<!DOCTYPE html>
<html>
<head>
<title>Application</title>

<style>
body{font-family:Arial;background:#eef6ff;margin:0;}
.container{width:800px;margin:30px auto;}
.box{background:white;padding:20px;border-radius:10px;}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;padding:10px;margin:5px 0;
}

button{
padding:10px;background:#0073e6;color:white;border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h2>Application</h2>

<div id="form"></div>

</div>
</div>

<script>

const params=new URLSearchParams(location.search);
let role=params.get("role");

let roleStatus=localStorage.getItem("role_"+role)||"OPEN";

if(roleStatus==="CLOSED"){
document.body.innerHTML=`
<h1 style="color:red;text-align:center;margin-top:100px;">
🚫 Applications Closed
</h1>
<p style="text-align:center;">This role is closed.</p>
`;
throw new Error();
}

let current=0;

document.getElementById("form").innerHTML=`

<div class="section active">

<h3>Section 1 of 7</h3>
<p>JetBlue Flight Deck Application</p>

<button onclick="next()">Next</button>
</div>

<div class="section">
<h3>Section 2</h3>
<input id="discord" placeholder="Discord">
<input id="roblox" placeholder="Roblox">
<input id="time" placeholder="Flight Time">
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<div class="section">
<h3>Section 3</h3>
<input id="timezone" placeholder="Timezone">
<input id="activity" placeholder="Activity">
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<div class="section">
<h3>Section 4</h3>
<textarea id="why"></textarea>
<textarea id="strengths"></textarea>
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<div class="section">
<h3>Section 5</h3>
<textarea id="flightq"></textarea>
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<div class="section">
<h3>Section 6</h3>
<textarea id="scenario"></textarea>
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<div class="section">
<h3>Section 7</h3>
<button onclick="submit()">Submit</button>
<button onclick="back()">Back</button>
</div>

`;

let sections=document.querySelectorAll(".section");

function show(){
sections.forEach((s,i)=>{
s.classList.remove("active");
if(i===current)s.classList.add("active");
});
}

function next(){if(current<sections.length-1)current++;show();}
function back(){if(current>0)current--;show();}

function submit(){

let apps=JSON.parse(localStorage.getItem("apps")||"[]");

apps.push({
id:Date.now(),
role,
discord:discord.value,
roblox:roblox.value,
time:time.value,
timezone:timezone.value,
activity:activity.value,
why:why.value,
strengths:strengths.value,
flightq:flightq.value,
scenario:scenario.value,
date:new Date().toLocaleString()
});

localStorage.setItem("apps",JSON.stringify(apps));

alert("Submitted");
location.href="index.html";
}

</script>

</body>
</html>
