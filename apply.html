<!DOCTYPE html>
<html>
<head>
<title>JetBlue Application</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#dff1ff,#f7fbff);
}

.container{
width:900px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
text-align:center;
color:#0073e6;
}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
}

button{
padding:12px 18px;
background:#0073e6;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:10px;
}

.nav{
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2 id="title">Application</h2>

<div id="form"></div>

</div>
</div>

<script>

/* ================= ROLE ================= */
let role = new URLSearchParams(location.search).get("role") || "Flight Deck";

/* ================= STATUS CHECK ================= */
let status = localStorage.getItem("roleStatus_" + role) || "OPEN";

if(status === "CLOSED"){
document.body.innerHTML = `
<div style="text-align:center;margin-top:150px;font-family:Arial;">
<h1 style="color:red;">🚫 ${role} Applications Closed</h1>
<p>Please check back later.</p>

<button onclick="location.href='index.html'"
style="padding:10px 20px;background:#0073e6;color:white;border:none;border-radius:10px;">
Go Back
</button>
</div>
`;
throw new Error("CLOSED");
}

document.getElementById("title").innerText = role + " Application";

/* ================= FORM ================= */
document.getElementById("form").innerHTML = `

<!-- SECTION 1 -->
<div class="section active">
<h3>Welcome</h3>
<p>You are applying for: <b>${role}</b></p>
<button onclick="next()">Start</button>
</div>

<!-- SECTION 2 -->
<div class="section">
<h3>Applicant Info</h3>

<input id="discord" placeholder="Discord Username">
<input id="roblox" placeholder="Roblox Username">
<input id="time" placeholder="PTFS Flight Time">

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>
</div>

<!-- SECTION 3 -->
<div class="section">
<h3>About You</h3>

<textarea id="why" placeholder="Why do you want to join?"></textarea>
<textarea id="strengths" placeholder="Strengths / Weaknesses"></textarea>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>
</div>

<!-- SECTION 4 -->
<div class="section">
<h3>Flight Knowledge</h3>

<textarea id="flaps" placeholder="When to retract flaps"></textarea>
<textarea id="vfr" placeholder="VFR / IFR meaning"></textarea>
<textarea id="ils" placeholder="What is ILS"></textarea>

<div class="nav">
<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>
</div>

<!-- SECTION 5 -->
<div class="section">
<h3>Submit</h3>

<button onclick="submit()">Submit Application</button>

<div class="nav">
<button onclick="back()">Back</button>
</div>
</div>

`;

/* ================= NAVIGATION ================= */
let sections = document.querySelectorAll(".section");
let current = 0;

function show(){
sections.forEach((s,i)=>{
s.classList.toggle("active", i===current);
});
}

function next(){
if(current < sections.length-1) current++;
show();
}

function back(){
if(current > 0) current--;
show();
}

/* ================= SUBMIT ================= */
function submit(){

let apps = JSON.parse(localStorage.getItem("apps") || "[]");

apps.push({
role:role,
discord:discord.value || "",
roblox:roblox.value || "",
time:time.value || "",
why:why.value || "",
strengths:strengths.value || "",
flaps:flaps.value || "",
vfr:vfr.value || "",
ils:ils.value || "",
date:new Date().toLocaleString(),
hidden:false,
deleted:false
});

localStorage.setItem("apps", JSON.stringify(apps));

let history = JSON.parse(localStorage.getItem("history") || "[]");
history.push(apps[apps.length-1]);
localStorage.setItem("history", JSON.stringify(history));

alert("Application Submitted!");
location.href="index.html";
}

</script>

</body>
</html>
