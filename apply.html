<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Application</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #e6f2ff, #ffffff);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,115,230,0.1) 2px, transparent 2px),
        radial-gradient(circle at 70% 80%, rgba(0,115,230,0.1) 2px, transparent 2px);
      background-size: 50px 50px;
    }

    .container {
      width: 750px;
      margin: 40px auto;
    }

    .header {
      background: #0073e6;
      color: white;
      padding: 20px;
      border-radius: 12px;
    }

    .box {
      background: white;
      margin-top: 20px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .role {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .progress {
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .bar {
      height: 10px;
      width: 0%;
      background: #0073e6;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>JetBlue Application</h1>
  </div>

  <div class="box">

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <p id="percent">Progress: 0%</p>

    <div class="role" id="roleText"></div>

    <form onsubmit="save(event)">

      <input placeholder="Discord Username">
      <input placeholder="Discord ID">
      <input placeholder="Roblox Username">
      <input type="number" placeholder="PTFS Flight Time">

      <select>
        <option>13-15</option>
        <option>16-17</option>
        <option>18-20</option>
        <option>21+</option>
      </select>

      <textarea placeholder="Why do you want to join?"></textarea>
      <textarea placeholder="Strengths & Weaknesses"></textarea>

      <select>
        <option>Yes</option>
        <option>No</option>
      </select>

      <button type="submit">Submit Application</button>

    </form>

  </div>

</div>

<script>
const role = new URLSearchParams(location.search).get("role");
document.getElementById("roleText").innerText = "Applying for: " + role;

const inputs = document.querySelectorAll("input, textarea, select");
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");

function update() {
  let filled = 0;
  inputs.forEach(i => {
    if (i.value) filled++;
  });

  let p = Math.round((filled / inputs.length) * 100);
  bar.style.width = p + "%";
  percent.innerText = "Progress: " + p + "%";
}

inputs.forEach(i => i.addEventListener("input", update));

function save(e) {
  e.preventDefault();

  let apps = JSON.parse(localStorage.getItem("applications") || "[]");

  apps.push({
    id: Date.now(),
    role,
    status: "Pending",
    date: new Date().toLocaleString()
  });

  localStorage.setItem("applications", JSON.stringify(apps));

  alert("Application submitted!");
  location.href = "index.html";
}
</script>

</body>
</html>
