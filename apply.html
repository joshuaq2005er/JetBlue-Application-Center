<!DOCTYPE html>
<html>
<head>
<title>JetBlue Application</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#dff1ff,#f7fbff);
}

.container{
width:900px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
text-align:center;
color:#0073e6;
}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
}

button{
padding:12px 18px;
background:#0073e6;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:10px;
}

.nav{
display:flex;
justify-content:space-between;
}

.error{
color:red;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>JetBlue Flight Deck Application</h2>

<div id="form"></div>

</div>
</div>

<script>

let role="Flight Deck";

/* STATUS CHECK */
let status=localStorage.getItem("roleStatus_"+role)||"OPEN";

if(status==="CLOSED"){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:100px'>APPLICATION CLOSED</h1>";
throw new Error();
}

/* FORM */
document.getElementById("form").innerHTML=`... (UNCHANGED FORM CONTENT ABOVE) ...`;

/* NAV */
let sections=document.querySelectorAll(".section");
let c=0;

function show(){
sections.forEach((s,i)=>s.classList.toggle("active",i===c));
}

function next(){if(c<sections.length-1)c++;show();}
function back(){if(c>0)c--;show();}

/* VALIDATION (UNCHANGED) */
function v2(){
if(!discord.value||!discordid.value||!roblox.value||!time.value||!age.value||!proof.value){
e2.innerText="Fill all fields";return;
}
e2.innerText="";next();
}

function v3(){
if(!timezone.value||!robloxact.value||!discordact.value||!device.value||!grammar.value){
e3.innerText="Fill all fields";return;
}
e3.innerText="";next();
}

function v4(){
if(!words.value||!exp.value||!mic.value||!why.value||!standout.value||!strengths.value){
e4.innerText="Fill all fields";return;
}
e4.innerText="";next();
}

function v5(){
if(!flaps.value||!vfr.value||!ils.value||!chart.value||!callouts.value||!flightplan.value){
e5.innerText="Fill all fields";return;
}
e5.innerText="";next();
}

function v6(){
if(!s1.value||!s2.value||!s3.value){
e6.innerText="Fill all fields";return;
}
e6.innerText="";next();
}

/* ✅ FIXED SUBMIT (THIS WAS THE ISSUE) */
function submit(){

if(!agree1.value||!agree2.value){
e7.innerText="Complete agreements";return;
}

let apps=JSON.parse(localStorage.getItem("apps")||"[]");

apps.push({
role,

discord:discord.value,
discordid:discordid.value,
roblox:roblox.value,
time:time.value,
age:age.value,
proof:proof.value,

timezone:timezone.value,
robloxact:robloxact.value,
discordact:discordact.value,
device:device.value,
grammar:grammar.value,

words:words.value,
exp:exp.value,
mic:mic.value,
why:why.value,
standout:standout.value,
strengths:strengths.value,

flaps:flaps.value,
vfr:vfr.value,
ils:ils.value,
chart:chart.value,
callouts:callouts.value,
flightplan:flightplan.value,

s1:s1.value,
s2:s2.value,
s3:s3.value,

agree1:agree1.value,
agree2:agree2.value,

date:new Date().toLocaleString(),
hidden:false,
deleted:false
});

localStorage.setItem("apps",JSON.stringify(apps));

let history=JSON.parse(localStorage.getItem("history")||"[]");
history.push(apps[apps.length-1]);
localStorage.setItem("history",JSON.stringify(history));

alert("Submitted!");
location.href="index.html";
}

</script>

</body>
</html>
