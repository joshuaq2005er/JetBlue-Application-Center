<!DOCTYPE html>
<html>
<head>
<title>JetBlue Application</title>

<style>
body{font-family:Arial;background:#eef6ff;margin:0;}
.container{width:850px;margin:20px auto;}
.box{background:white;padding:20px;border-radius:10px;}

.section{display:none;}
.active{display:block;}

input,textarea,select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:10px;
background:#0073e6;
color:white;
border:none;
cursor:pointer;
margin:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h2 id="title"></h2>

<div id="form"></div>

</div>
</div>

<script>

let role=new URLSearchParams(location.search).get("role");

let status=localStorage.getItem("role_"+role)||"OPEN";

if(status==="CLOSED"){
document.body.innerHTML=`
<h1 style="color:red;text-align:center;margin-top:100px;">
🚫 Applications Closed
</h1>
<button onclick="location.href='index.html'">Go Back</button>
`;
throw new Error();
}

document.getElementById("title").innerText="Applying for "+role;

document.getElementById("form").innerHTML=`

<!-- SECTION 1 -->
<div class="section active">
<h3>Section 1 of 7</h3>
<p>JetBlue Flight Deck Application Introduction</p>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 2 -->
<div class="section">
<h3>Applicant Information</h3>

<input id="discord" placeholder="Discord Username">
<input id="discordid" placeholder="Discord ID">
<input id="roblox" placeholder="Roblox Username">
<input id="time" placeholder="PTFS Flight Time">
<input id="age" placeholder="Age Group">
<input id="proof" placeholder="Gamepass Proof">

<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 3 -->
<div class="section">
<h3>Activity</h3>

<input id="timezone" placeholder="Timezone">
<input id="robloxact" placeholder="Roblox Activity 1-5">
<input id="discordact" placeholder="Discord Activity 1-5">
<input id="device" placeholder="Device">
<input id="grammar" placeholder="Grammar 1-5">

<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 4 -->
<div class="section">
<h3>About You</h3>

<textarea id="words" placeholder="3 words"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="mic" placeholder="Mic?"></textarea>
<textarea id="why" placeholder="Why JetBlue?"></textarea>
<textarea id="standout" placeholder="Standout"></textarea>
<textarea id="strengths" placeholder="Strengths/Weaknesses"></textarea>

<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 5 -->
<div class="section">
<h3>Flight Questions</h3>

<textarea id="flaps"></textarea>
<textarea id="vfr"></textarea>
<textarea id="ils"></textarea>
<textarea id="chart"></textarea>
<textarea id="callouts"></textarea>
<textarea id="plan"></textarea>

<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 6 -->
<div class="section">
<h3>Scenarios</h3>

<textarea id="disturb"></textarea>
<textarea id="fire"></textarea>
<textarea id="trolls"></textarea>

<button onclick="back()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 7 -->
<div class="section">
<h3>Agreements</h3>

<select id="agree1"><option>Yes</option><option>No</option><option>Maybe</option></select>
<select id="agree2"><option>Yes</option><option>No</option><option>Maybe</option></select>

<button onclick="submit()">Submit</button>
<button onclick="back()">Back</button>
</div>

`;

let sections=document.querySelectorAll(".section");
let current=0;

function show(){
sections.forEach((s,i)=>{
s.classList.remove("active");
if(i===current)s.classList.add("active");
});
}

function next(){if(current<sections.length-1)current++;show();}
function back(){if(current>0)current--;show();}

function submit(){

let apps=JSON.parse(localStorage.getItem("apps")||"[]");

apps.push({
id:Date.now(),
role:"Flight Deck",

discord:discord.value,
discordid:discordid.value,
roblox:roblox.value,
time:time.value,
age:age.value,
proof:proof.value,

timezone:timezone.value,
robloxact:robloxact.value,
discordact:discordact.value,
device:device.value,
grammar:grammar.value,

words:words.value,
experience:experience.value,
mic:mic.value,
why:why.value,
standout:standout.value,
strengths:strengths.value,

flaps:flaps.value,
vfr:vfr.value,
ils:ils.value,
chart:chart.value,
callouts:callouts.value,
plan:plan.value,

disturb:disturb.value,
fire:fire.value,
trolls:trolls.value,

date:new Date().toLocaleString()
});

localStorage.setItem("apps",JSON.stringify(apps));

let history=JSON.parse(localStorage.getItem("history")||"[]");
history.push(apps[apps.length-1]);
localStorage.setItem("history",JSON.stringify(history));

alert("Submitted!");
location.href="index.html";
}

</script>

</body>
</html>
