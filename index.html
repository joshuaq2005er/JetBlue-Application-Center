<!DOCTYPE html>
<html>
<head>
<title>JetBlue Careers</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef6ff;
}

.header{
text-align:center;
padding:40px;
}

h1{color:#0073e6;}

.grid{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
width:260px;
background:white;
padding:15px;
border-radius:12px;
text-decoration:none;
color:black;
position:relative;
}

.badge{
position:absolute;
top:10px;
right:10px;
padding:5px 10px;
border-radius:20px;
color:white;
font-size:12px;
}

.open{background:green;}
.closed{background:red;}
</style>
</head>

<body>

<div class="header">
<h1>JetBlue Careers</h1>
<p>Select a role</p>
</div>

<div class="grid">

<a class="card" href="apply.html?role=Flight%20Deck">
<div class="badge open">OPEN</div>
<b>Flight Deck</b><br>Take control of aircraft.
</a>

<a class="card" href="apply.html?role=Cabin%20Crew">
<div class="badge open">OPEN</div>
<b>Cabin Crew</b><br>Passenger service.
</a>

<a class="card" href="apply.html?role=Ground%20Crew">
<div class="badge closed">CLOSED</div>
<b>Ground Crew</b><br>Aircraft safety.
</a>

<a class="card" href="admin.html">
<div class="badge open">ADMIN</div>
<b>Admin Panel</b><br>Manage applications.
</a>

</div>

</body>
</html>
