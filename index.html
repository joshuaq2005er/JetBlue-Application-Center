<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Application Center</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e6f2ff, #ffffff);
      background-image: radial-gradient(#cce6ff 1px, transparent 1px);
      background-size: 20px 20px;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      color: #0073e6;
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      margin-bottom: 40px;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 220px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      color: black;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      color: #0073e6;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>JetBlue Application Center</h1>
    <p>Select the position you want to apply for</p>

    <div class="card-container">

      <a class="card" href="apply.html?role=Flight%20Deck">
        <h2>Flight Deck</h2>
        <p>Pilots & flight operations</p>
      </a>

      <a class="card" href="apply.html?role=Cabin%20Crew">
        <h2>Cabin Crew</h2>
        <p>In-flight service team</p>
      </a>

      <a class="card" href="apply.html?role=Ground%20Crew">
        <h2>Ground Crew</h2>
        <p>Airport operations staff</p>
      </a>

    </div>
  </div>

</body>
</html>
