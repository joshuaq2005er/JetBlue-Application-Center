<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Careers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #d9efff, #ffffff);
    }

    .header {
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #0073e6;
    }

    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px;
    }

    .card {
      width: 280px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      text-decoration: none;
      color: black;
      position: relative;
    }

    .title {
      color: #0073e6;
      font-weight: bold;
      font-size: 18px;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: white;
    }

    .open {
      background: green;
    }

    .closed {
      background: red;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>JetBlue Careers</h1>
</div>

<div class="grid">

  <a class="card" href="apply.html?role=Flight%20Deck&status=open">
    <div class="badge open">OPEN</div>
    <div class="title">Flight Deck</div>
    Take the reigns and lead the way.
  </a>

  <a class="card" href="apply.html?role=Cabin%20Crew&status=open">
    <div class="badge open">OPEN</div>
    <div class="title">Cabin Crew</div>
    Provide comfort and hospitality.
  </a>

  <a class="card" href="apply.html?role=Ground%20Crew&status=closed">
    <div class="badge closed">CLOSED</div>
    <div class="title">Ground Crew</div>
    Ensure aircraft safety.
  </a>

  <a class="card" href="apply.html?role=Flight%20Operations&status=open">
    <div class="badge open">OPEN</div>
    <div class="title">Flight Operations</div>
    Manage flight systems.
  </a>

  <a class="card" href="apply.html?role=Human%20Resources&status=open">
    <div class="badge open">OPEN</div>
    <div class="title">Human Resources</div>
    Manage staff recruitment.
  </a>

</div>

</body>
</html>
