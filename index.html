<!DOCTYPE html>
<html>
<head>
<title>JetBlue Careers</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#d9efff,#fff);
}

.header {
  text-align: center;
  padding: 50px;
}

h1 { color:#0073e6; }

.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card {
  width:260px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  text-decoration:none;
  color:black;
  position:relative;
}

.title { color:#0073e6; font-weight:bold; }

.badge {
  position:absolute;
  top:10px;
  right:10px;
  padding:5px 10px;
  border-radius:20px;
  color:white;
  font-size:12px;
}

.open { background:green; }
.closed { background:red; }
</style>
</head>

<body>

<div class="header">
<h1>JetBlue Careers</h1>
<p>Select a role</p>
</div>

<div class="grid">

<a class="card" href="apply.html?role=Flight%20Deck">
<div class="badge open">OPEN</div>
<div class="title">Flight Deck</div>
Lead aircraft operations.
</a>

<a class="card" href="apply.html?role=Cabin%20Crew">
<div class="badge open">OPEN</div>
<div class="title">Cabin Crew</div>
Passenger service.
</a>

<a class="card" href="apply.html?role=Ground%20Crew">
<div class="badge closed">CLOSED</div>
<div class="title">Ground Crew</div>
Aircraft safety.
</a>

<a class="card" href="apply.html?role=Flight%20Ops">
<div class="badge open">OPEN</div>
<div class="title">Flight Ops</div>
Operations control.
</a>

<a class="card" href="apply.html?role=HR">
<div class="badge open">OPEN</div>
<div class="title">Human Resources</div>
Recruitment team.
</a>

</div>

</body>
</html>
