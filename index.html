<!DOCTYPE html>
<html>
<head>
  <title>JetBlue Application Center</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eaf4ff;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #0073e6;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #005bb5;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>JetBlue Application Center</h1>
    <p>Fill out the form below to apply</p>

    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <textarea placeholder="Why do you want to apply?" rows="5" required></textarea>
      <button type="submit">Submit Application</button>
    </form>
  </div>

</body>
</html>
