<!DOCTYPE html>
<html>
<head>
<title>JetBlue Application Center</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e6f3ff,#f7fbff);
}

.header{
background:#0073e6;
color:white;
padding:20px;
text-align:center;
font-size:20px;
}

.container{
width:800px;
margin:40px auto;
}

.card{
background:white;
padding:20px;
border-radius:16px;
margin:15px 0;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.status{
font-weight:bold;
}

.open{color:green;}
.closed{color:red;}

#errorBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:15px 25px;
border-radius:12px;
display:none;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
z-index:999;
}
</style>
</head>

<body>

<div id="errorBox"></div>

<div class="header">
JetBlue Application Center
</div>

<div class="container">

<div class="card" onclick="openApp('Flight Deck','apply.html?role=Flight%20Deck')">
<h3>Flight Deck</h3>
<p>Take the reigns and lead the way to unlimited destinations.</p>
Status: <span id="fd" class="status"></span>
</div>

<div class="card" onclick="openApp('Cabin Crew','apply.html?role=Cabin%20Crew')">
<h3>Cabin Crew</h3>
<p>Provide the utmost comfort and hospitality to our passengers.</p>
Status: <span id="cc" class="status"></span>
</div>

<div class="card" onclick="openApp('Ground Crew','apply.html?role=Ground%20Crew')">
<h3>Ground Crew</h3>
<p>Ensure safety and readiness of aircraft operations.</p>
Status: <span id="gc" class="status"></span>
</div>

</div>

<script>

/* ===== STATUS SYSTEM ===== */
function getStatus(role){
let s = localStorage.getItem("roleStatus_"+role);
if(!s){
localStorage.setItem("roleStatus_"+role,"OPEN");
return "OPEN";
}
return s;
}

function setStatus(id,role){
let el=document.getElementById(id);
let s=getStatus(role);

el.innerText=s;
el.className="status "+(s==="OPEN"?"open":"closed");
}

/* ===== ERROR MESSAGE ===== */
function showError(msg){
let box=document.getElementById("errorBox");
box.innerText=msg;
box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},5000);
}

/* ===== OPEN APPLICATION ===== */
function openApp(role,link){

let status=getStatus(role);

if(status==="CLOSED"){
showError("Current application you've chosen is closed.");
return;
}

location.href=link;
}

/* ===== INIT ===== */
setStatus("fd","Flight Deck");
setStatus("cc","Cabin Crew");
setStatus("gc","Ground Crew");

</script>

</body>
</html>
